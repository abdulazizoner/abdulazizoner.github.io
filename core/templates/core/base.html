<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aonware.ai - Principal System Architect{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkgrey: '#27242C',
                        deepindigo: '#554099',
                        clearblue: '#5CACF0',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Source Code Pro', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #27242C;
            color: #f3f4f6; /* light gray for text readability */
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-darkgrey border-b border-deepindigo py-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight text-white hover:text-clearblue transition">
                <span class="text-clearblue">&lt;</span> Aonware.ai <span class="text-clearblue">/&gt;</span>
            </a>
            <div class="space-x-6 text-sm font-mono hidden md:block text-gray-300">
                <a href="#portfolio" class="hover:text-clearblue transition">./portfolio</a>
                <a href="#blog" class="hover:text-clearblue transition">./blog</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-6 py-12">
        {% block content %}
        {% endblock content %}
    </main>

    <!-- Footer -->
    <footer class="bg-darkgrey border-t border-deepindigo py-6 mt-12">
        <div class="container mx-auto px-6 text-center text-sm font-mono text-gray-400">
            <p>Initializing shutdown sequence... <span class="text-clearblue">Aonware.ai &copy; {% now "Y" %}</span>. System offline.</p>
        </div>
    </footer>

    {% block scripts %}
    {% endblock scripts %}
</body>
</html>
